<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro Contable</title>
    <script src="librocontable.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">
        <h1 class="text-start m-5 p-3 rounded bg-primary text-white">Libro Contable</h1>
        <div class="row">
            <div class="col-12">
                <!-- Formulario para agregar registros -->
                <form id="form-libro-contable" class="mb-4 text-white ">
                    <!-- Campos del formulario -->
                    <div class="row rounded justify-content-center bg-secondary">
                        <div class="col-auto align-self-end">
                            <button type="submit" id="grabar" class="btn btn-success">Grabar</button>
                        </div>
                        <div class="col-auto">
                            <label for="fecha" class="col-form-label">Fecha:</label>
                            <input type="date" id="fecha" name="fecha" class="form-control" min="1900-01-01"
                                max="2026-05-07" required>
                        </div>
                        <div class="col-auto">
                            <label for="concepto" class="col-form-label">Concepto:</label>
                            <input type="text" id="concepto" name="concepto" class="form-control" required>
                        </div>
                        <div class="col-auto">
                            <label for="tipo" class="col-form-label">D/H:</label>
                            <select id="tipo" name="tipo" class="form-select" required>
                                <option value="">Seleccione</option>
                                <option value="D">D</option>
                                <option value="H">H</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <label for="importe" class="col-form-label">Importe:</label>
                            <input type="number" id="importe" name="importe" class="form-control" step="0.01" min="0.01"
                                required>
                        </div>


                    </div>
                    <div id="missatgeError" class="text-danger col-auto">

                    </div>
                </form>
                <table class="table table-bordered text-center">
                    <thead >
                        <tr>
                            <th>Borrar</th>
                            <th>Fecha</th>
                            <th>Concepto</th>
                            <th>D/H</th>
                            <th>Importe</th>
                            <th>Saldo</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-libro-contable">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
